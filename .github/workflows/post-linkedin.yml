name: LinkedIn Posting Bot

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Restore LinkedIn session state
        env:
          LINKEDIN_STORAGE_STATE_B64: ${{ secrets.LINKEDIN_STORAGE_STATE_B64 }}
        run: |
          mkdir -p data
          if [ -z "$LINKEDIN_STORAGE_STATE_B64" ]; then
            echo "Missing LINKEDIN_STORAGE_STATE_B64 secret"
            exit 1
          fi
          echo "$LINKEDIN_STORAGE_STATE_B64" | base64 --decode > data/cookies.json

      - name: Run posting pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LINKEDIN_AUTONOMOUS: "true"
        run: python main.py

      - name: Commit updated post history
        run: |
          if git diff --quiet -- data/post_history.json; then
            echo "No post history changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/post_history.json
          git commit -m "chore: update post history"
          git push